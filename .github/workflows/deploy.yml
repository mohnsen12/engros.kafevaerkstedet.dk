name: Deploy til Simply.com

# Kører automatisk når du pusher til main-branchen — og kan også startes manuelt.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Hent koden
        uses: actions/checkout@v4

      - name: Upload app/ til Simply via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:    ${{ secrets.FTP_SERVER }}
          username:  ${{ secrets.FTP_USERNAME }}
          password:  ${{ secrets.FTP_PASSWORD }}
          protocol:  ftps
          local-dir: ./app/
          server-dir: ${{ secrets.FTP_TARGET_DIR }}

          # Disse filer røres ALDRIG på serveren — så live-databasen,
          # hemmeligheden, cache og logs aldrig overskrives eller slettes.
          exclude: |
            **/engros.db
            **/engros.db-journal
            **/engros.db-wal
            **/*_cache.json
            **/billede_cache/**
            **/token_cache.json
            **/dns_cache.json
            **/php_errors.log
            **/php.ini
            **/.git*
            **/.git*/**
